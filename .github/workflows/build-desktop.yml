name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'  # Build on version tags (v1.0.0, v2.1.0, etc.)
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Prepare macOS artifact
        run: |
          rm -rf "build/View Source Vibe.app" 2>/dev/null || true
          mv "build/macos/Build/Products/Release/View Source Vibe.app" "build/View Source Vibe.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ViewSourceVibe-macOS
          path: build/View Source Vibe.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ViewSourceVibe-Windows
          path: build/windows/runner/Release

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libx11-dev pkg-config cmake ninja-build libblkid-dev libwpewebkit-1.0-dev libwpebackend-fdo-1.0-dev
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Linux
        run: flutter build linux --release
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ViewSourceVibe-Linux
          path: build/linux/x64/release/bundle

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ViewSourceVibe-iOS
          path: build/ios/iphoneos/Runner.app

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > $GITHUB_WORKSPACE/android/app/release.keystore
          ls -la $GITHUB_WORKSPACE/android/app/release.keystore

      - name: Build Android APK
        run: flutter build apk --release
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore

      - name: Build Android App Bundle
        run: flutter build appbundle --release
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
      
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: ViewSourceVibe-Android-APK
          path: build/app/outputs/apk/release/app-release.apk
      
      - name: Upload Android App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ViewSourceVibe-Android-AAB
          path: build/app/outputs/bundle/release/app-release.aab

  create-release:
    needs: [build-macos, build-windows, build-linux, build-ios, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ViewSourceVibe-macOS/**
            ViewSourceVibe-Windows/**
            ViewSourceVibe-Linux/**
            ViewSourceVibe-iOS/**
            ViewSourceVibe-Android-APK/**
            ViewSourceVibe-Android-AAB/**
